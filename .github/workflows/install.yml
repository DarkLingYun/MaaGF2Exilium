name: install

on:
  push:
    tags:
      - "v*"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          if $is_release; then
            # 直接从 github.ref 提取 tag 名称
            tag=${GITHUB_REF#refs/tags/}
          else
            tag=$(git describe --tags --match "v*" HEAD || true)
            if [[ $tag != v* ]]; then
              tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
              if [[ $tag != v* ]]; then
                tag="v0.0.0"
              fi
              tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
            fi
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}

  update:
    needs: meta
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: update
        shell: bash
        run: |
          mkdir -p ./update
          rsync -av --exclude='MaaCommonAssets' ./assets/ ./update/


      - uses: actions/upload-artifact@v4
        with:
          name: update
          path: "update"

  build:
    needs: meta
    strategy:
      matrix:
        include:
          - os: windows-latest
            os_name: win
            mfa_os_name: win
            arch: aarch64
            mfa_arch: arm64
          - os: windows-latest
            os_name: win
            mfa_os_name: win
            arch: x86_64
            mfa_arch: x64
          - os: macos-latest
            os_name: macos
            mfa_os_name: osx
            arch: aarch64
            mfa_arch: arm64
          - os: macos-latest
            os_name: macos
            mfa_os_name: osx
            arch: x86_64
            mfa_arch: x64
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os_name }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Setup Embedded Python (Windows)
        if: matrix.os_name == 'win'
        shell: bash
        run: |
          PYTHON_VERSION="3.11.11"
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            PYTHON_ARCH="amd64"
          elif [ "${{ matrix.arch }}" = "aarch64" ]; then
            PYTHON_ARCH="arm64"
          else
            echo "Unknown architecture: ${{ matrix.arch }}"
            exit 1
          fi

          PYTHON_URL="https://www.python.org/ftp/python/${PYTHON_VERSION}/python-${PYTHON_VERSION}-embed-${PYTHON_ARCH}.zip"
          echo "Downloading embedded Python from: $PYTHON_URL"
          curl -L "$PYTHON_URL" -o python-embed.zip

          mkdir -p deps/python
          unzip -q python-embed.zip -d deps/python
          rm python-embed.zip

          cd deps/python

          # 启用 site-packages 支持（嵌入式 Python 默认禁用）
          # 找到 _pth 文件并取消 import site 的注释
          pth_file=$(ls python*._pth 2>/dev/null || echo "python311._pth")
          if [ -f "$pth_file" ]; then
            sed -i 's/^#import site/import site/' "$pth_file"
            echo "Enabled site-packages in $pth_file"
          fi

          # 安装 pip
          curl -sSL https://bootstrap.pypa.io/get-pip.py -o get-pip.py
          ./python.exe get-pip.py --no-warn-script-location
          rm get-pip.py

          # 安装 maafw 和 maaagentbinary
          ./python.exe -m pip install --no-warn-script-location maafw maaagentbinary

          echo "Embedded Python setup complete."
          ./python.exe -c "import maa; print('maa module version:', maa.__version__ if hasattr(maa, '__version__') else 'ok')"

      - name: Download MFAAvalonia
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "*-${{ matrix.mfa_os_name }}-${{ matrix.mfa_arch }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFA archive files
        shell: bash
        run: |
          # Remove any remaining archive files after extraction
          find ./MFA -type f \( -name "*.zip" -o -name "*.tar" -o -name "*.tar.gz" -o -name "*.7z" -o -name "*.rar" \) -delete
          echo "Cleaned up archive files in MFA directory"

      - name: Convert PNG to ICO
        shell: bash
        run: |
          if [ "${{ matrix.os_name }}" = "win" ]; then
            choco install imagemagick -y
            magick convert imgs/图标2.png -define icon:auto-resize=256,128,64,48,32,24,16 gf2.ico
          elif [ "${{ matrix.os_name }}" = "macos" ]; then
            brew install imagemagick
            magick convert imgs/图标2.png -define icon:auto-resize=256,128,64,48,32,24,16 gf2.ico
          fi

      - name: Modify MFAAvalonia exe icon
        if: matrix.arch == 'x86_64' && matrix.os_name == 'win'
        shell: bash
        run: |
          curl -L "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -o rcedit.exe
          ./rcedit.exe "MFA/MFAAvalonia.exe" --set-icon "gf2.ico"
          echo "MFAAvalonia icon modified successfully"

      - name: Install
        shell: bash
        run: |
          python ./install.py ${{ needs.meta.outputs.tag }}
          if [ "${{ matrix.os_name }}" = "win" ]; then
            jq --arg url "https://github.com/DarkLingYun/MaaGF2Exilium" --arg version "${{ needs.meta.outputs.tag }}" '. + {"url": $url, "version": $version}' ./install/interface.json > ./install/interface.json.tmp && mv ./install/interface.json.tmp ./install/interface.json
          fi

      - name: Replace Assets with custom assets folder
        shell: bash
        run: |
          if [ -d "install/Assets" ]; then
            rm -rf install/Assets
            echo "Removed original Assets folder"
          fi
          mkdir -p install/assets
          if [ -f "gf2.ico" ]; then
            cp gf2.ico install/assets/logo.ico
            echo "Copied custom icon to assets/logo.ico"
          fi
          
      - uses: actions/upload-artifact@v4
        with:
          name: MaaGF2ExiliumGUI-${{ matrix.os_name }}-${{ matrix.arch }}
          path: "install"
        
  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd "$f" && 7z a -tzip ../"$f-${{ needs.meta.outputs.tag }}.zip" .)
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          append_body: true
          body: |
            [已有 Mirror酱 CDK? 前往Mirror酱高速下载](https://mirrorchyan.com/zh/projects?rid=MaaGF2Exilium)

      - name: Trigger MirrorChyanUploading
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}